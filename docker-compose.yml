# ============================================
# LeadKeeper - Docker Compose
# ============================================

services:
  # ---- Backend: FastAPI (внутренний) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadkeeper-backend
    restart: unless-stopped
    # Внутренний порт - не пробрасываем наружу!
    # Frontend обращается через nginx прокси
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Монтируем .env для SMTP
      - ./backend/.env:/app/backend/.env:ro
      # Персистентность базы
      - leadkeeper-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---- Frontend: Nginx (внешний) ----
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: leadkeeper-frontend
    restart: unless-stopped
    # Порт наружу!
    ports:
      - "5175:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

# ---- Volumes ----
volumes:
  leadkeeper-data:
    driver: local

# ---- Networks ----
networks:
  default:
    name: leadkeeper-network
    driver: bridge