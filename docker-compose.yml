# ============================================
# LeadKeeper - Docker Compose
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadkeeper-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Для разработки: монтируем .env файл
      - ./backend/.env:/app/backend/.env:ro
      # Персистентность базы данных
      - leadkeeper-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  leadkeeper-data: